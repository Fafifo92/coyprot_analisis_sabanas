<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rastreo de Auditoría (Admin) - Coyprot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal" x-data="adminAuditManager()">

    <div class="flex h-screen overflow-hidden">

        <!-- Sidebar -->
        <aside class="w-64 bg-gray-900 shadow-xl hidden sm:flex flex-col">
            <div class="h-16 flex items-center justify-center bg-gray-800 border-b border-gray-700">
                <span class="text-white text-xl font-bold uppercase tracking-wider">Coyprot Admin</span>
            </div>

            <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
                <a href="/dashboard" class="flex items-center px-4 py-3 text-gray-400 hover:bg-gray-800 hover:text-white rounded-lg transition-colors">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    Mis Proyectos
                </a>

                <a href="/users" class="flex items-center px-4 py-3 text-gray-400 hover:bg-gray-800 hover:text-white rounded-lg transition-colors">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    Gestión de Usuarios
                </a>

                <a href="/admin/projects" class="flex items-center px-4 py-3 text-gray-400 hover:bg-gray-800 hover:text-white rounded-lg transition-colors">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                    Todos los Casos
                </a>

                <a href="/admin/audit" class="flex items-center px-4 py-3 bg-indigo-600 text-white rounded-lg transition-colors">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                    Auditoría de Acciones
                </a>
            </nav>

            <div class="p-4 bg-gray-800 border-t border-gray-700">
                <div class="flex items-center pt-3 border-t border-gray-700 mt-2">
                    <div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-white font-bold" x-text="username.charAt(0).toUpperCase()"></div>
                    <div class="ml-3 flex-1 overflow-hidden">
                        <p class="text-sm font-medium text-white truncate" x-text="username"></p>
                        <button @click="logout" class="text-xs text-gray-400 hover:text-red-400 transition-colors">Cerrar Sesión</button>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-16 bg-white shadow-sm flex items-center justify-between px-6 sm:hidden">
                <span class="text-lg font-bold text-gray-800">Coyprot Admin</span>
                <button @click="logout" class="text-sm text-red-600 font-medium">Salir</button>
            </header>

            <div class="flex-1 overflow-y-auto p-6 bg-gray-50">
                <div class="max-w-7xl mx-auto space-y-6">

                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <div>
                            <h1 class="text-2xl font-bold text-gray-900">Rastreo y Logs de Sistema</h1>
                            <p class="text-sm text-gray-500 mt-1">Historial cronológico de todos los eventos relevantes (Logins, Creación de Casos, Descargas PDF).</p>
                        </div>
                        <button @click="fetchLogs" class="inline-flex items-center px-4 py-2 bg-white border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
                            <svg class="w-4 h-4 mr-2 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                            Refrescar Registros
                        </button>
                    </div>

                    <!-- Tabla de Logs -->
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="min-w-full divide-y divide-gray-200">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Fecha / Hora</th>
                                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Usuario (ID)</th>
                                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Categoría</th>
                                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Detalles de la Acción</th>
                                    </tr>
                                </thead>
                                <tbody class="bg-white divide-y divide-gray-200">
                                    <template x-if="loading">
                                        <tr><td colspan="4" class="px-6 py-8 text-center text-gray-500">Cargando registros...</td></tr>
                                    </template>

                                    <template x-for="log in logs" :key="log.id">
                                        <tr>
                                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="new Date(log.created_at).toLocaleString()"></td>
                                            <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-gray-900" x-text="`UID: ${log.user_id}`"></td>
                                            <td class="px-6 py-4 whitespace-nowrap">
                                                <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-blue-100 text-blue-800" x-text="log.action"></span>
                                            </td>
                                            <td class="px-6 py-4 text-sm text-gray-700 max-w-lg break-words" x-text="log.details || 'N/A'"></td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <!-- Script de lógica Frontend -->
    <script>
        function parseJwt(token) {
            try { return JSON.parse(atob(token.split('.')[1])); } catch (e) { return null; }
        }

        function adminAuditManager() {
            return {
                logs: [],
                loading: true,
                username: '',

                init() {
                    const token = localStorage.getItem('access_token');
                    if (!token) { window.location.href = '/login'; return; }
                    this.username = parseJwt(token).sub || 'Admin';
                    this.fetchLogs();
                },

                async fetchLogs() {
                    this.loading = true;
                    try {
                        const response = await fetch('/api/admin/audit', {
                            headers: { 'Authorization': `Bearer ${localStorage.getItem('access_token')}` }
                        });
                        if (response.status === 401 || response.status === 403) {
                            window.location.href = '/dashboard';
                            return;
                        }
                        this.logs = await response.json();
                    } catch (error) {
                        console.error('Error cargando logs de auditoría', error);
                    } finally {
                        this.loading = false;
                    }
                },

                logout() {
                    localStorage.removeItem('access_token');
                    window.location.href = '/login';
                }
            }
        }
    </script>
</body>
</html>
