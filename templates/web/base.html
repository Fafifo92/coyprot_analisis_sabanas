<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Coyprot SaaS{% endblock %}</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal" x-data="globalLayout()">

    <div class="flex h-screen overflow-hidden">

        <!-- Sidebar -->
        <aside class="w-64 bg-gray-900 shadow-xl hidden sm:flex flex-col">
            <div class="h-16 flex items-center justify-center bg-gray-800 border-b border-gray-700">
                <span class="text-white text-xl font-bold tracking-wider" x-text="isAdmin ? 'Coyprot' : (companyName || 'C. Analyzer')"></span>
            </div>

            <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
                <a href="/dashboard" class="flex items-center px-4 py-3 rounded-lg transition-colors"
                   :class="window.location.pathname === '/dashboard' ? 'bg-indigo-600 text-white' : 'text-gray-400 hover:bg-gray-800 hover:text-white'">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    Mis Proyectos
                </a>

                <a href="/settings" class="flex items-center px-4 py-3 rounded-lg transition-colors"
                   :class="window.location.pathname === '/settings' ? 'bg-indigo-600 text-white' : 'text-gray-400 hover:bg-gray-800 hover:text-white'">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    Configuración
                </a>

                <!-- Panel Admin (Solo visible si isAdmin === true) -->
                <div x-show="isAdmin" class="pt-4 mt-4 border-t border-gray-700" style="display: none;">
                    <p class="px-4 text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Panel Admin</p>
                    <a href="/users" class="flex items-center px-4 py-3 rounded-lg transition-colors"
                       :class="window.location.pathname === '/users' ? 'bg-indigo-600 text-white' : 'text-gray-400 hover:bg-gray-800 hover:text-white'">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                        Gestión de Usuarios
                    </a>
                    <a href="/admin/projects" class="flex items-center px-4 py-3 rounded-lg transition-colors"
                       :class="window.location.pathname === '/admin/projects' ? 'bg-indigo-600 text-white' : 'text-gray-400 hover:bg-gray-800 hover:text-white'">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                        Todos los Casos
                    </a>
                    <a href="/admin/audit" class="flex items-center px-4 py-3 rounded-lg transition-colors"
                       :class="window.location.pathname === '/admin/audit' ? 'bg-indigo-600 text-white' : 'text-gray-400 hover:bg-gray-800 hover:text-white'">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                        Auditoría de Acciones
                    </a>
                </div>
            </nav>

            <div class="p-4 bg-gray-800 border-t border-gray-700">
                <div class="mb-4">
                    <div class="flex items-center justify-between mb-1">
                        <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Tus Tokens</span>
                        <span class="text-xs font-bold text-indigo-400" x-text="isAdmin ? '∞' : tokensBalance"></span>
                    </div>
                    <!-- Barra visual de tokens usados -->
                    <div class="w-full bg-gray-700 rounded-full h-2.5 overflow-hidden" x-show="!isAdmin">
                        <div class="bg-indigo-500 h-2.5 rounded-full transition-all duration-500"
                             :style="`width: ${Math.min(100, (projectsCreated / (tokensBalance + projectsCreated || 1)) * 100)}%`">
                        </div>
                    </div>
                    <p class="text-xs text-gray-500 mt-1" x-show="!isAdmin">
                        <span x-text="projectsCreated"></span> casos creados.
                    </p>
                    <p class="text-xs text-gray-500 mt-1" x-show="isAdmin">Uso ilimitado.</p>
                </div>

                <div class="flex items-center pt-3 border-t border-gray-700 mt-2">
                    <div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-white font-bold" x-text="username.charAt(0).toUpperCase()"></div>
                    <div class="ml-3 flex-1 overflow-hidden">
                        <p class="text-sm font-medium text-white truncate" x-text="username"></p>
                        <button @click="logout" class="text-xs text-gray-400 hover:text-red-400 transition-colors">Cerrar Sesión</button>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <!-- Header Móvil -->
            <header class="h-16 bg-white shadow-sm flex items-center justify-between px-6 sm:hidden">
                <span class="text-lg font-bold text-gray-800">Coyprot SaaS</span>
                <button @click="logout" class="text-sm text-red-600 font-medium">Salir</button>
            </header>

            <div class="flex-1 overflow-y-auto p-6 bg-gray-50">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <!-- Script de lógica global (Header/Sidebar) -->
    <script>
        function parseJwt(token) {
            try { return JSON.parse(atob(token.split('.')[1])); } catch (e) { return null; }
        }

        // Layout Base: Maneja el Sidebar y el Auth del usuario
        function globalLayout() {
            return {
                username: '',
                isAdmin: localStorage.getItem('is_admin') === 'true',
                tokensBalance: 0,
                projectsCreated: 0,
                companyName: '',

                init() {
                    const token = localStorage.getItem('access_token');
                    if (!token) { window.location.href = '/login'; return; }
                    this.username = parseJwt(token).sub || 'Usuario';
                    this.fetchMe();
                },

                async fetchMe() {
                    try {
                        const res = await fetch('/api/auth/me', {
                            headers: { 'Authorization': `Bearer ${localStorage.getItem('access_token')}` }
                        });
                        if (res.ok) {
                            const data = await res.json();
                            this.tokensBalance = data.tokens_balance;
                            this.projectsCreated = data.projects_created;
                            if (data.profile_settings && data.profile_settings.company_name) {
                                this.companyName = data.profile_settings.company_name;
                            }
                        } else if (res.status === 401) {
                            Swal.fire({
                                icon: 'error', title: 'Acceso Denegado', text: 'Tu sesión expiró o tu cuenta fue desactivada.',
                                confirmButtonText: 'Ir a Login'
                            }).then(() => this.logout());
                        }
                    } catch(e) {}
                },

                logout() {
                    localStorage.removeItem('access_token');
                    localStorage.removeItem('is_admin');
                    window.location.href = '/login';
                }
            }
        }
    </script>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
