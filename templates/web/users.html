{% extends "base.html" %}

{% block title %}Gestión de Usuarios - Coyprot Admin{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto space-y-6" x-data="usersManager()">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
        <div>
            <h1 class="text-2xl font-bold text-gray-900">Usuarios del Sistema</h1>
            <p class="text-sm text-gray-500 mt-1">Crea cuentas de clientes, asigna tokens y gestiona accesos.</p>
        </div>
        <button @click="openModal" class="inline-flex items-center px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-md shadow-sm transition-colors">
            <svg class="w-5 h-5 mr-2 -ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
            Crear Usuario
        </button>
    </div>

    <!-- Tabla de Usuarios -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Usuario</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Rol</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Estado</th>
                        <th scope="col" class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Tokens</th>
                        <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Acciones</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    <template x-if="loading">
                        <tr><td colspan="5" class="px-6 py-8 text-center text-gray-500">Cargando usuarios...</td></tr>
                    </template>

                    <template x-for="user in users" :key="user.id">
                        <tr>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="flex items-center">
                                    <div class="h-10 w-10 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold" x-text="user.username.charAt(0).toUpperCase()"></div>
                                    <div class="ml-4">
                                        <div class="text-sm font-medium text-gray-900" x-text="user.username"></div>
                                        <div class="text-sm text-gray-500" x-text="`Creado: ${new Date(user.created_at).toLocaleDateString()}`"></div>
                                    </div>
                                </div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full"
                                      :class="user.is_admin ? 'bg-purple-100 text-purple-800' : 'bg-gray-100 text-gray-800'"
                                      x-text="user.is_admin ? 'Administrador' : 'Suscriptor'">
                                </span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full"
                                      :class="user.is_active ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'"
                                      x-text="user.is_active ? 'Activo' : 'Bloqueado'">
                                </span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-center text-sm font-medium">
                                <span x-show="user.is_admin" class="text-gray-400 italic text-xs">Uso Ilimitado</span>
                                <div x-show="!user.is_admin" class="flex flex-col items-center">
                                    <span class="text-indigo-600 font-bold text-lg"><span x-text="user.tokens_balance"></span><span class="text-gray-500 text-xs ml-1 font-normal">disponibles</span></span>
                                    <span class="text-gray-500 text-xs mt-1 border-t pt-1 border-gray-200"><span x-text="user.projects_created || 0"></span> usos / casos creados</span>
                                </div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium space-x-2">
                                <button @click="openEditModal(user)" class="text-indigo-600 hover:text-indigo-900">Editar</button>
                                <button @click="toggleStatus(user)" class="text-red-600 hover:text-red-900" x-text="user.is_active ? 'Bloquear' : 'Desbloquear'"></button>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal Crear/Editar Usuario -->
    <div x-show="isModalOpen" class="fixed inset-0 z-50 overflow-y-auto" style="display: none;">
        <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
            <div x-show="isModalOpen" class="fixed inset-0 transition-opacity bg-gray-500 bg-opacity-75" @click="closeModal"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen">&#8203;</span>

            <div x-show="isModalOpen" class="inline-block px-4 pt-5 pb-4 overflow-hidden text-left align-bottom transition-all transform bg-white rounded-lg shadow-xl sm:my-8 sm:align-middle sm:max-w-lg sm:w-full sm:p-6">

                <div class="mt-3 text-center sm:mt-0 sm:text-left">
                    <h3 class="text-lg font-medium leading-6 text-gray-900" x-text="isEditing ? 'Editar Usuario' : 'Crear Nuevo Usuario'"></h3>

                    <form class="mt-6 space-y-4" @submit.prevent="saveUser">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Nombre de Usuario (Login)</label>
                            <input type="text" x-model="formUser.username" :disabled="isEditing" required class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md text-sm shadow-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 disabled:bg-gray-100">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700">Contraseña <span x-show="isEditing" class="text-xs text-gray-500 font-normal">(Dejar en blanco para no cambiar)</span></label>
                            <input type="password" x-model="formUser.password" :required="!isEditing" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md text-sm shadow-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                        </div>

                        <div class="flex items-center justify-between gap-4">
                            <div class="flex-1 pt-6">
                                <label class="inline-flex items-center">
                                    <input type="checkbox" x-model="formUser.is_admin" class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                                    <span class="ml-2 text-sm text-gray-700">Privilegios de Admin</span>
                                </label>
                            </div>
                            <div class="flex-1" x-show="!formUser.is_admin">
                                <label class="block text-sm font-medium text-gray-700">Tokens Asignados</label>
                                <input type="number" min="0" x-model.number="formUser.tokens_balance" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md text-sm shadow-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                            </div>
                        </div>

                        <div class="mt-5 sm:mt-6 sm:grid sm:grid-cols-2 sm:gap-3 sm:grid-flow-row-dense pt-4 border-t border-gray-200">
                            <button type="submit" :disabled="saving" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-indigo-600 text-base font-medium text-white hover:bg-indigo-700 focus:outline-none sm:col-start-2 sm:text-sm">
                                <span x-text="saving ? 'Guardando...' : 'Guardar Usuario'"></span>
                            </button>
                            <button type="button" @click="closeModal" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none sm:mt-0 sm:col-start-1 sm:text-sm">
                                Cancelar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    function usersManager() {
        return {
            users: [],
            loading: true,
            isModalOpen: false,
            isEditing: false,
            saving: false,
            formUser: { id: null, username: '', password: '', is_admin: false, tokens_balance: 0 },

            init() {
                this.fetchUsers();
            },

            async fetchUsers() {
                this.loading = true;
                try {
                    const response = await fetch('/api/admin/users', {
                        headers: { 'Authorization': `Bearer ${localStorage.getItem('access_token')}` }
                    });
                    if (response.status === 401 || response.status === 403) return; // Managed by layout
                    this.users = await response.json();
                } catch (error) {
                    console.error(error);
                } finally {
                    this.loading = false;
                }
            },

            openModal() {
                this.isEditing = false;
                this.formUser = { id: null, username: '', password: '', is_admin: false, tokens_balance: 0 };
                this.isModalOpen = true;
            },

            openEditModal(user) {
                this.isEditing = true;
                this.formUser = {
                    id: user.id,
                    username: user.username,
                    password: '',
                    is_admin: user.is_admin,
                    tokens_balance: user.tokens_balance
                };
                this.isModalOpen = true;
            },

            closeModal() {
                this.isModalOpen = false;
            },

            async saveUser() {
                this.saving = true;
                const url = this.isEditing ? `/api/admin/users/${this.formUser.id}` : '/api/admin/users';
                const method = this.isEditing ? 'PATCH' : 'POST';
                let payload = { ...this.formUser };
                if (this.isEditing && !payload.password) delete payload.password;

                try {
                    const response = await fetch(url, {
                        method: method,
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${localStorage.getItem('access_token')}`
                        },
                        body: JSON.stringify(payload)
                    });
                    const data = await response.json();
                    if (!response.ok) throw new Error(data.detail);

                    Swal.fire('Éxito', `Usuario ${this.isEditing ? 'actualizado' : 'creado'}`, 'success');
                    this.closeModal();
                    this.fetchUsers();
                } catch (error) {
                    Swal.fire('Error', error.message, 'error');
                } finally {
                    this.saving = false;
                }
            },

            async toggleStatus(user) {
                const action = user.is_active ? 'bloquear' : 'desbloquear';
                const result = await Swal.fire({
                    title: `¿${action}?`,
                    text: `El usuario ${user.username} ${user.is_active ? 'no podrá acceder.' : 'recuperará acceso.'}`,
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: user.is_active ? '#d33' : '#3085d6',
                    confirmButtonText: `Sí, ${action}`
                });

                if (result.isConfirmed) {
                    try {
                        const response = await fetch(`/api/admin/users/${user.id}`, {
                            method: 'PATCH',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${localStorage.getItem('access_token')}`
                            },
                            body: JSON.stringify({ is_active: !user.is_active })
                        });
                        if (!response.ok) throw new Error('Error al cambiar el estado');
                        Swal.fire('¡Hecho!', '', 'success');
                        this.fetchUsers();
                    } catch (error) {
                        Swal.fire('Error', error.message, 'error');
                    }
                }
            }
        }
    }
</script>
{% endblock %}
