version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: coyprot_db
    restart: always
    environment:
      POSTGRES_USER: coyprot_user
      POSTGRES_PASSWORD: coyprot_password
      POSTGRES_DB: coyprot_api
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: coyprot_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build: .
    container_name: coyprot_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://coyprot_user:coyprot_password@db:5432/coyprot_api
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=CAMBIAR_ESTO_EN_PRODUCCION_SUPER_SECRETA_COYPROT_1234
    depends_on:
      - db
      - redis
    volumes:
      - ./uploads:/app/uploads
      - ./output:/app/output
      - ./logs:/app/logs

volumes:
  postgres_data:
  redis_data:
